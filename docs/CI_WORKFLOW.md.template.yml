name: CI

# Runs on every PR and on every push to main.
# Phase 0 contract: a PR with a failing test or type error cannot merge.
# Branch protection on main (configured in GitHub UI as a one-time setup)
# enforces the "Required" status checks listed below.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs of the same ref so the latest commit always wins.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Don't gate merges on coverage — track it as an artifact so we can
    # tighten the threshold later when the suite is wider.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Coverage
        run: npm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14
