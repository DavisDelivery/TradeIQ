# Firebase Indexes Auto-Deploy Workflow

The build PAT can't push files into `.github/workflows/` so this workflow has to be installed manually via the GitHub UI:

1. Go to `github.com/DavisDelivery/TradeIQ` → Add file → Create new file
2. Filename: `.github/workflows/firebase-indexes.yml`
3. Paste the YAML below

The workflow runs on every push to main that modifies `firestore.indexes.json`. It uses the `FIREBASE_SERVICE_ACCOUNT` repo secret (set up during Phase 0). No new secrets needed.

```yaml
name: Firebase indexes auto-deploy

on:
  push:
    branches: [main]
    paths:
      - firestore.indexes.json
      - firebase.json
  workflow_dispatch:  # allows manual trigger from Actions tab

jobs:
  deploy-indexes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account JSON to disk
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > $HOME/sa.json
          chmod 600 $HOME/sa.json

      - name: Deploy Firestore indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.HOME }}/sa.json
        run: |
          firebase deploy \
            --only firestore:indexes \
            --project tradeiq-alpha \
            --non-interactive

      - name: Wipe service account file
        if: always()
        run: rm -f $HOME/sa.json
```
