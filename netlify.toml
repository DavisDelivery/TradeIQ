[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Prophet scans ~200-400 tickers with 7-layer ensemble — needs more than default 10s
[functions."prophet-picks"]
  timeout = 26

# Target board now supports full-index scans (sp500, russell2k, etc.) — needs budget too
[functions."target-board"]
  timeout = 26

# Insider board scans up to 120 tickers via Quiver — give it room
[functions."insider-board"]
  timeout = 26

# Earnings board fetches Finnhub calendar + per-ticker bars + history
[functions."earnings-board"]
  timeout = 26

# Catalyst board scans 100 tickers × 4 providers per cold call
[functions."catalyst-board"]
  timeout = 26

# ==========================================================================
# Scheduled (background) functions — full-universe scans that populate
# Firestore snapshots. Phase 1 introduces these to fix the silent product bug
# where every board scanned only the first 80–200 alphabetical tickers.
# Background timeout cap is 15 min; scans budget themselves to 14 min.
# ==========================================================================

[functions."scheduled/scan-target-board"]
  timeout = 900
  schedule = "0,30 13-21 * * 1-5"

[functions."scheduled/scan-williams"]
  timeout = 900
  schedule = "0,30 13-21 * * 1-5"

# Lynch is fundamentals-driven; daily refresh after US close is enough.
[functions."scheduled/scan-lynch"]
  timeout = 900
  schedule = "0 22 * * 1-5"

[functions."scheduled/scan-catalyst"]
  timeout = 900
  schedule = "0,30 13-21 * * 1-5"

# ==========================================================================
# API redirects — rewrite /api/<endpoint> to /.netlify/functions/<endpoint>
# ==========================================================================

[[redirects]]
  from = "/api/target-board"
  to = "/.netlify/functions/target-board"
  status = 200

