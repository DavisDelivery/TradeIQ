# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ==========================================================================
# Headers
# ==========================================================================

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
