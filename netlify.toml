[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# ==========================================================================
# API redirects — rewrite /api/<endpoint> to /.netlify/functions/<endpoint>
# ==========================================================================

[[redirects]]
  from = "/api/target-board"
  to = "/.netlify/functions/target-board"
  status = 200

[[redirects]]
  from = "/api/engine-test"
  to = "/.netlify/functions/engine-test"
  status = 200

[[redirects]]
  from = "/api/earnings-board"
  to = "/.netlify/functions/earnings-board"
  status = 200

[[redirects]]
  from = "/api/options-flow"
  to = "/.netlify/functions/options-flow"
  status = 200

[[redirects]]
  from = "/api/backtest"
  to = "/.netlify/functions/backtest"
  status = 200

[[redirects]]
  from = "/api/research"
  to = "/.netlify/functions/research"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/williams-board"
  to = "/.netlify/functions/williams-board"
  status = 200

[[redirects]]
  from = "/api/lynch-board"
  to = "/.netlify/functions/lynch-board"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ==========================================================================
# Headers
# ==========================================================================

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
