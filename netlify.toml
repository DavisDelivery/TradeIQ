# Phase 4e-1: Prophet Portfolio read endpoint. Returns persisted state,
# last 20 swaps, last 252-day equity curve, and on-the-fly window metrics.
[[redirects]]
  from = "/api/prophet-portfolio"
  to = "/.netlify/functions/prophet-portfolio"
  status = 200

# Phase 4e-1 follow-up: synchronous Prophet layer audit (W0). Uses
# production env's FIREBASE_SERVICE_ACCOUNT to read snapshots.
[[redirects]]
  from = "/api/audit-prophet-layers"
  to = "/.netlify/functions/audit-prophet-layers"
  status = 200

# Phase 4e-1 follow-up: portfolio backtest runner.
#   POST /api/portfolio-backtest/start  → trigger (fires background)
#   GET  /api/portfolio-backtest-runs    → list runs
#   GET  /api/portfolio-backtest-runs?runId=X → single run summary
# Trigger uses a distinct path because method-conditioned redirects are
# known broken (see /api/backtest-runs comment below + Lessons #7+#8).
[[redirects]]
  from = "/api/portfolio-backtest/start"
  to = "/.netlify/functions/portfolio-backtest-trigger"
  status = 200

[[redirects]]
  from = "/api/portfolio-backtest-runs"
  to = "/.netlify/functions/portfolio-backtest-runs"
  status = 200

# Phase 4c-1: on-demand narration for a single Prophet pick. POST only.
# Bounded by per-IP rate limit (30/hour) inside the function; no Netlify-
# level method gating because that's known broken (see /api/backtest-runs
# comment above and Lessons #7+#8 in ORCHESTRATOR.md).
[[redirects]]
  from = "/api/prophet-narrate"
  to = "/.netlify/functions/prophet-narrate"
  status = 200

[[redirects]]
  from = "/api/snapshot-history"
  to = "/.netlify/functions/snapshot-history"
  status = 200

# Phase 4b backtest run viewer (read-only).
# List endpoint:    GET  /api/backtest-runs?limit=20  → list
# Detail endpoint:  GET  /api/backtest-runs/:runId    → get
# Trigger endpoint: POST /api/backtest-runs/start     → trigger
#
# Method-conditioned redirects (conditions = { method = ["POST"] }) are
# not reliably honored by Netlify — they're silently ignored and both
# rules match, causing the unconditional GET fallback to swallow POSTs.
# Confirmed in production after the 4b-2 merge: a POST to
# /api/backtest-runs returned the list payload, not the trigger.
# Using a distinct trailing path for the trigger removes the ambiguity
# entirely. /start matches REST action-verb convention.
[[redirects]]
  from = "/api/backtest-runs"
  to = "/.netlify/functions/backtest-runs-list"
  status = 200

# Trigger MUST be listed BEFORE the dynamic :runId route so its
# more-specific literal /start segment matches first.
[[redirects]]
  from = "/api/backtest-runs/start"
  to = "/.netlify/functions/backtest-runs-trigger"
  status = 200

# Detail endpoint: /api/backtest-runs/:runId → handler reads runId from
# queryStringParameters (Netlify path-param convention).
[[redirects]]
  from = "/api/backtest-runs/:runId"
  to = "/.netlify/functions/backtest-runs-get"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ==========================================================================
# Headers
# ==========================================================================

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
