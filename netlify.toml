# Phase 4o W2 — diagnostic surface for the checkpoint-resume scan
# workers. Reads the latest scanRuns/{runId} doc and exposes its cursor
# state: nextTickerIndex, invocationCount, lastError, age of the last
# invocation (a stalled chain shows hours instead of minutes).
[[redirects]]
  from = "/api/scan-status"
  to = "/.netlify/functions/scan-status"
  status = 200

# Phase 4r W1 — diagnostic surface for the portfolio backtest loop.
# Mirrors /api/scan-status but for portfolioBacktests/{runId} docs:
# per-window latest run, done-for-version count toward 8/8 rolling,
# stale-pending and stale-running inventory.
[[redirects]]
  from = "/api/backtest-status"
  to = "/.netlify/functions/backtest-status"
  status = 200

# Phase 4b backtest run viewer (read-only).
# List endpoint:    GET  /api/backtest-runs?limit=20  → list
# Detail endpoint:  GET  /api/backtest-runs/:runId    → get
# Trigger endpoint: POST /api/backtest-runs/start     → trigger
#
# Method-conditioned redirects (conditions = { method = ["POST"] }) are
# not reliably honored by Netlify — they're silently ignored and both
# rules match, causing the unconditional GET fallback to swallow POSTs.
# Confirmed in production after the 4b-2 merge: a POST to
# /api/backtest-runs returned the list payload, not the trigger.
# Using a distinct trailing path for the trigger removes the ambiguity
# entirely. /start matches REST action-verb convention.
[[redirects]]
  from = "/api/backtest-runs"
  to = "/.netlify/functions/backtest-runs-list"
  status = 200

# Trigger MUST be listed BEFORE the dynamic :runId route so its
# more-specific literal /start segment matches first.
[[redirects]]
  from = "/api/backtest-runs/start"
  to = "/.netlify/functions/backtest-runs-trigger"
  status = 200

# FIX-1 W1 — zombie-run recovery sweep (POST only, enforced in-function).
# Marks stale running/pending backtestRuns docs failed. Like /start, this
# literal segment MUST precede the dynamic :runId route.
[[redirects]]
  from = "/api/backtest-runs/recover"
  to = "/.netlify/functions/backtest-runs-recover"
  status = 200

# Detail endpoint: /api/backtest-runs/:runId → handler reads runId from
# queryStringParameters (Netlify path-param convention).
[[redirects]]
  from = "/api/backtest-runs/:runId"
  to = "/.netlify/functions/backtest-runs-get"
  status = 200

