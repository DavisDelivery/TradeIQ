[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # Briefs (briefs/*.md) are agent hand-off documents containing the
  # read-only GITHUB_PAT for in-session repo reads. They're checked in
  # for reproducibility but never deployed to dist/. Tell Netlify's
  # secrets-scanner to skip them so the build doesn't fail on
  # documentation-as-code.
  SECRETS_SCAN_OMIT_PATHS = "briefs/*"

[functions]
  node_bundler = "esbuild"

# Prophet scans ~200-400 tickers with 7-layer ensemble — needs more than default 10s
[functions."prophet-picks"]
  timeout = 26

# Target board now supports full-index scans (sp500, russell2k, etc.) — needs budget too
[functions."target-board"]
  timeout = 26

# VECTOR evaluator fans out to Polygon + Massive + Finnhub + FRED — needs
# more than the default 10s even with per-dependency caps.
[functions."vector-evaluate"]
  timeout = 26

# Anthropic-backed generators + serial bar fetchers — all can exceed the
# 10s default and die with no response (same class as the vector-evaluate
# hang; audit 2026-07-15).
[functions."chart-analysis"]
  timeout = 26

[functions."research"]
  timeout = 26

[functions."prophet-narrate"]
  timeout = 26

[functions."options-flow"]
  timeout = 26

# Live-probe confirmed hangs (0-byte platform kills at the 10s default):
# engine-test + target-rationale run the 10-analyst provider fan-out;
# audit-stub-analysts walks 4 universes of snapshot docs and its own file
# documents a 26s budget the toml never granted.
[functions."engine-test"]
  timeout = 26

[functions."target-rationale"]
  timeout = 26

[functions."audit-stub-analysts"]
  timeout = 26

# Insider board scans up to 120 tickers via Quiver — give it room
[functions."insider-board"]
  timeout = 26

# Earnings board fetches Finnhub calendar + per-ticker bars + history
[functions."earnings-board"]
  timeout = 26

# Catalyst board scans 100 tickers × 4 providers per cold call
[functions."catalyst-board"]
  timeout = 26

# Lynch board runs a ~150-ticker GARP scan with a 24s budget. Without this
# override it ran on Netlify's DEFAULT 10s ceiling, so its scan budget could
# never finish and a cold index=all load reliably 504'd. Match the other
# scan boards at 26s so the live path can complete.
[functions."lynch-board"]
  timeout = 26

# Williams board runs a partial live scan (200/2435 names) on index=all,
# ~16s warm. Same as lynch — it had no timeout stanza, so it ran on the 10s
# default and was one slow provider away from a 504. Give it the 26s ceiling.
[functions."williams-board"]
  timeout = 26

# DESK-1 W1 — desk-stats derives watchlist stats from cached 1Y bars;
# a cold cache (fresh watchlist) is up to 60 Polygon bar fetches at
# concurrency 6, so it needs the scan-board ceiling, not the 10s default.
[functions."desk-stats"]
  timeout = 26

# DESK-1 W1 — earnings-radar paces per-ticker Finnhub calls through the
# 55rpm token bucket; a cold batch can sit in the bucket queue.
[functions."earnings-radar"]
  timeout = 26

# Phase 6 PR-G0 — stock-detail fans out to ~10 providers in parallel
# (bars × 3, fundamentals, earnings × 2, news, insider, sector-medians,
# ticker-info). Each call is bounded internally by withTimeoutStatus
# (~6-7s per dep) so the handler should settle in ~7s + assembly. This
# 26s ceiling is the Netlify-gateway safety net in case any of those
# internal timeouts misbehave.
[functions."stock-detail"]
  timeout = 26

